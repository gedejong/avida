name: Continuous Integration

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Restore C/C++ compiler cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ hashFiles('**/CMakeLists.txt', 'build_avida') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-ccache-
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ make python3 ccache
    - name: Build Avida
      env:
        CC: ccache gcc
        CXX: ccache g++
        CCACHE_DIR: ~/.cache/ccache
      run: ./build_avida -DAVD_UNIT_TESTS:BOOL=ON
    - name: Run tests
      run: |
        set -o pipefail
        python3 - <<'PY' > selected-tests.txt
        import re
        import subprocess
        exclude = {"sex", "shaded_green_beard_instructions"}
        tests = []
        listed = subprocess.check_output(["./run_tests", "--list-tests"], text=True)
        for line in listed.splitlines():
            line = line.strip()
            if not line or line.startswith("available tests") or line.startswith("---"):
                continue
            m = re.match(r'^\*?\s*(?:[cp]\s+)*([A-Za-z0-9_\\-]+)$', line)
            if not m:
                continue
            name = m.group(1)
            if name == "avida-core":
                continue
            if name not in exclude:
                tests.append(name)
        print(" ".join(tests))
        PY
        TESTS="$(< selected-tests.txt)"
        ./run_tests --mode=slave ${TESTS} 2>&1 | tee run_tests.log
    - name: Run known flaky consistency diagnostics (non-blocking)
      if: always()
      run: |
        set +e
        ./run_tests --mode=slave --show-diff --diff-max-threshold=1048576 --verbose --xml-report=run_tests-diagnostics.xml sex shaded_green_beard_instructions 2>&1 | tee run_tests-diagnostics.log
        exit 0
    - name: Run unit tests
      run: ./cbuild/work/unit-tests
    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tests-logs
        path: |
          run_tests.log
          run_tests-diagnostics.log
          run_tests-diagnostics.xml
          selected-tests.txt
        if-no-files-found: warn
    - name: Show ccache statistics
      if: always()
      run: ccache -s || true

  tests-rust:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Restore C/C++ compiler cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ hashFiles('**/CMakeLists.txt', 'build_avida') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-ccache-
    - name: Restore Rust dependency/build cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust/avida-rust/target
        key: ${{ runner.os }}-rust-${{ hashFiles('rust/avida-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ make python3 ccache
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Build Avida (Rust-enabled)
      env:
        AVD_ENABLE_RUST: "1"
        CC: ccache gcc
        CXX: ccache g++
        CCACHE_DIR: ~/.cache/ccache
      run: ./build_avida -DAVD_UNIT_TESTS:BOOL=ON
    - name: Run tests (Rust-enabled)
      run: |
        set -o pipefail
        python3 - <<'PY' > selected-tests-rust.txt
        import re
        import subprocess
        exclude = {"sex", "shaded_green_beard_instructions"}
        tests = []
        listed = subprocess.check_output(["./run_tests", "--list-tests"], text=True)
        for line in listed.splitlines():
            line = line.strip()
            if not line or line.startswith("available tests") or line.startswith("---"):
                continue
            m = re.match(r'^\*?\s*(?:[cp]\s+)*([A-Za-z0-9_\\-]+)$', line)
            if not m:
                continue
            name = m.group(1)
            if name == "avida-core":
                continue
            if name not in exclude:
                tests.append(name)
        print(" ".join(tests))
        PY
        TESTS="$(< selected-tests-rust.txt)"
        ./run_tests --mode=slave ${TESTS} 2>&1 | tee run_tests-rust.log
    - name: Run known flaky consistency diagnostics on Rust-enabled build (non-blocking)
      if: always()
      run: |
        set +e
        ./run_tests --mode=slave --show-diff --diff-max-threshold=1048576 --verbose --xml-report=run_tests-rust-diagnostics.xml sex shaded_green_beard_instructions 2>&1 | tee run_tests-rust-diagnostics.log
        exit 0
    - name: Run unit tests (RunningStats parity)
      run: ./cbuild/work/unit-tests
    - name: Rust checks
      run: |
        cd rust/avida-rust
        cargo test --all-targets
        cargo fmt --check
        cargo clippy --all-targets -- -D warnings
    - name: Upload Rust test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tests-rust-logs
        path: |
          run_tests-rust.log
          run_tests-rust-diagnostics.log
          run_tests-rust-diagnostics.xml
          selected-tests-rust.txt
        if-no-files-found: warn
    - name: Show ccache statistics
      if: always()
      run: ccache -s || true

  perf-rust:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Restore Rust dependency/build cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust/avida-rust/target
        key: ${{ runner.os }}-rust-${{ hashFiles('rust/avida-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Run Rust critical path benchmarks
      run: |
        cd rust/avida-rust
        cargo bench --bench critical_paths
    - name: Soft-gate benchmark regressions
      run: |
        cd rust/avida-rust
        python3 scripts/ci_perf_check.py --threshold 0.50
    - name: Upload benchmark artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-critical-path-benchmarks
        path: rust/avida-rust/target/criterion
        if-no-files-found: error

  coverage-rust:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Restore Rust dependency/build cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust/avida-rust/target
        key: ${{ runner.os }}-rust-${{ hashFiles('rust/avida-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
    - name: Restore cargo-llvm-cov cache
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-llvm-cov
        key: ${{ runner.os }}-cargo-llvm-cov-0.8.4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install llvm-tools-preview
      run: rustup component add llvm-tools-preview
    - name: Install cargo-llvm-cov
      run: |
        if [ ! -x "${HOME}/.cargo/bin/cargo-llvm-cov" ]; then
          cargo install cargo-llvm-cov
        fi
    - name: Run Rust coverage gate (80%)
      run: |
        cd rust/avida-rust
        mkdir -p target
        ./scripts/ci_coverage_check.sh 80 | tee target/coverage-summary.txt
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-coverage-artifacts
        path: |
          rust/avida-rust/target/coverage-summary.txt
          rust/avida-rust/target/llvm-cov-target
        if-no-files-found: warn

